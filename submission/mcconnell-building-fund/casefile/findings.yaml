# Findings ledger. Each finding needs >=1 source_record.
# "documented" = present in / derived from public records. Does NOT assert causation or intent.
# All figures re-derived from raw data and fact-checked 2026-07-15 (corrected numbers below).

findings:
  - id: F-001
    thread: T-0001
    status: confirmed
    claim: >
      A single filer registered a fictitious entity — client "STATE OF LOC NATION GLOBAL PUBLIC
      BENEFIT CORPORATION" (Senate client_id 61287), self-described as an "Established sovereign govt"
      — via a self-registered registrant "Loc Community Association" (registrant_id 401108853), and
      reported $20,000,000 of lobbying income for each quarter of 2025 = $80,000,000 for the year
      (amendment-aware: one figure per quarter). The filing lists the lobbyist's covered position as
      "Head of State Black USA" and ties the money to H.R. 40, a $500-quadrillion claim, and printing
      a new currency. The filings are live on lda.senate.gov and mirrored in the House system.
    workflow_step: "mapper anomaly scan + raw JSON review (client_id 61287, 2025)"
    source_records:
      - "data/senate/2025/filings/filings_2025.json#4d5b1cb0-0971-43b8-958b-d260e2be8af1"
      - "data/senate/2024/filings/filings_2024.json#5000632b-e40b-4762-affc-551b46a40c91"
      - "house/2025_1stQuarter_XML/301694892.xml (senateID 401108853-61287)"
    caveats: >
      Describe as "reported/claimed", never "spent" — no money changed hands. $80M is the conservative
      amendment-aware count; naive sum incl. amendments + House copies reaches $180M (do not use).

  - id: F-002
    thread: T-0001
    status: confirmed
    claim: >
      The fabricated $80M dwarfs every real client by the fee measure and distorts national totals.
      By reported income (fees to outside firms), 2025: Loc Nation $80.0M vs next-largest real clients
      AIPAC $3.76M and Nippon Steel $3.42M (~21x). Its $80M also exceeds the single largest REAL
      lobbying budget in the country — US Chamber of Commerce $70.3M in reported in-house expenses. As
      a single filing, $20M is ~6x the largest legitimate single filing in four years ($3.5M). The
      $80M is ~1.3% of all reported 2025 federal lobbying dollars (income+expenses = $6.25B), or 2.78%
      of the income-only total ($2.88B).
    workflow_step: "amendment-aware client rankings + totals, 2025 Senate filings (recomputed 2026-07-15)"
    source_records:
      - "data/senate/2025/filings/filings_2025.json (client income/expense aggregates, amendment-aware)"
    caveats: >
      Do NOT say "biggest lobbying client in America" flatly — true only by income; in-house giants
      report comparable real money in the expenses field. Totals are corpus-computed with an
      amendment-dedup rule and run higher than published figures (OpenSecrets ~$4-4.5B); state the
      denominator and lead with the conservative ~1.3%.

  - id: F-003
    thread: T-0001
    status: documented
    claim: >
      The absence of a required dollar figure is structural, not a one-year blip. Filings carrying no
      dollar figure at all (neither income nor expenses) are ~24-26% every year 2022-2025; among
      quarterly activity reports specifically, ~10-12% every year report neither — a strikingly stable
      rate. This is consistent with a self-certified system that does not validate on the way in.
    workflow_step: "null-income vs null-both-fields counts by filing_type and year (recomputed 2026-07-15)"
    source_records:
      - "data/senate/<year>/filings/filings_<year>.json, 2022-2025 (filing_type breakdown)"
    caveats: >
      CORRECTION: earlier "a third (35%) blank" over-counted (income-field only; in-house filers use
      the expenses field; registrations/no-activity reports legitimately carry no dollar amount). Use
      ~25% (both fields null) / ~10-12% (activity reports). Supporting detail, not a pillar.

  - id: F-004
    thread: T-0001
    status: documented
    claim: >
      A false filing is illegal in principle but effectively unenforced. A knowing false LDA filing
      can draw a civil fine up to $200,000 (2 U.S.C. 1606(a)) or, if knowing and corrupt, up to 5
      years prison (1606(b)); 18 U.S.C. 1001 may also reach it via the 1001(c)(1) legislative-branch
      provision. But per GAO-25-107523, 2015-2024 enforcement was 3,566 LD-2 + 2,000 LD-203(R)
      referrals — ALL for failure to file; "enforcement actions include letters, emails, and telephone
      calls"; 63% still pending; in 2024 one $65,000 civil settlement (a repeat non-filer) and zero
      criminal; no JACK Act prosecutions ever. GAO documents no enforcement for a false figure.
    workflow_step: "checking-the-law (statute text) + GAO-25-107523 full read"
    source_records:
      - "2 U.S.C. 1606 — law.cornell.edu/uscode/text/2/1606 (read 2026-07-15)"
      - "2 U.S.C. 1605 — law.cornell.edu/uscode/text/2/1605 (read 2026-07-15)"
      - "18 U.S.C. 1001 — law.cornell.edu/uscode/text/18/1001 (read 2026-07-15)"
      - "GAO-25-107523, 2024 Lobbying Disclosure — gao.gov/products/gao-25-107523"
    caveats: >
      Pre-2015 settlement dollar amounts are secondary — verify vs original GAO reports before
      printing. "None ever for false content" is a negative — say "no documented case" and confirm via
      DOJ 1605(b) semiannual reports. Not a legal conclusion; for a lawyer.

legal_flags:
  - finding: F-004
    entity: state-of-loc-nation
    note: >
      A knowingly false LDA filing may implicate 2 U.S.C. 1606 (civil/criminal) and possibly 18 U.S.C.
      1001. ALL hooks require a culpable mental state (knowingly / corruptly / willfully = intent to
      deceive). A filer with sincere (if unfounded) belief may be outside these statutes entirely.
      Assessment for a lawyer, NOT a conclusion. Do not assert wrongdoing. Whether 1001(c) reaches LDA
      filings is unsettled — confirm with counsel.
    status: to_verify

  # --- Added S2 (2026-07-15): honorary-giving channel ---
  - id: F-005
    thread: T-0004
    status: confirmed
    claim: >
      Beyond capped FECA campaign donations, LD-203 filers disclosed 4,291 "Honorary Expenses" items
      (contribution_type='he') from 2022 through 2026 Q1, totaling ~$134,448,698 reported (steady
      ~$30-38M/year). The giver is the registrant (contributor field is "SELF" on ~93% of items). Top
      registrant-givers: Amazon $7.16M, State Farm $5.94M, Meta $5.40M, AARP $3.86M, Comcast $3.44M,
      Toyota $3.43M, Morgan Stanley $3.40M, Chevron $3.09M, Google $2.91M. The money concentrates in
      caucus-affiliated nonprofits: Congressional Black Caucus Foundation ~$25.5M (101 distinct
      corporate funders), Congressional Hispanic Caucus Institute + Leadership Institute ~$22.7M (80),
      APAICS ~$5.0M (39).
    workflow_step: "extract.py + profile.py + standouts.py over contributions_2022..2026.json (he only)"
    source_records:
      - "data/senate/2022..2026/contributions/contributions_*.json (contribution_type='he')"
    caveats: >
      "Reported/disclosed," not "spent on a member." Money goes to the charity/entity, not the member
      personally. A separate non-FECA layer also exists: Presidential Inaugural Committee ~$67.6M (120
      items) and Presidential Library ~$22.4M (120) — bigger per-item but a different, smaller-N story.

  - id: F-006
    thread: T-0005
    status: confirmed
    claim: >
      Corporate lobbying interests routed honorary money to institutions named for / in recognition of
      Senate GOP Leader Mitch McConnell. The Republican Party of Kentucky "Building Fund" (HQ = the
      "Mitch McConnell Building") received ~$1.525M across 8 'he' items: Pfizer $1,000,000 (2022-12-27),
      AT&T $100k x3, Microsoft $100k + $25k, Delta $50k x2. Broader "in honor of McConnell" corporate
      giving (excluding University of Louisville's own McConnell-Center/Archives spending of ~$2.53M)
      is ~$1.81M / 28 items / 18 funders, also reaching AEI, Hudson Institute galas and the JFK Center.
    workflow_step: "records.py he-cluster on McConnell; web verification"
    source_records:
      - "data/senate/2022/contributions/contributions_2022.json#7fcdd899-5c8c-46cd-94c3-9fa9eb8993b5"
      - "data/senate/2023/contributions/contributions_2023.json#4419ba3f-37df-4ee0-a2df-103180b7a117"
      - "https://kentuckylantern.com/2023/01/09/pfizer-gives-1-million-to-republican-party-of-kentucky-to-expand-its-headquarters/"
    caveats: >
      Keep U-of-Louisville's ~$2.53M self-reported McConnell-Center/Archives spending separate — that
      is the university disclosing its own named-center spending, not corporate influence money.
    legal_flags:
      - status: to_verify
        note: >
          2 U.S.C. 1604(d)(1)(E)(ii) disclosure (entity named for/in recognition of a covered official).
          Legal and uncapped; not a violation. A gift-rule/gratuity question (chamber rules, 18 U.S.C.
          201/1346) would need personal benefit or a linked official act — not shown by the filings.

  - id: F-007
    thread: T-0006
    status: confirmed
    claim: >
      The single largest honorary item in the corpus is State Farm Mutual Automobile Insurance Co.
      reporting $2,650,000 to Habitat for Humanity International, honoree "Rep. Virginia Foxx," dated
      2025-11-20. The money is real: State Farm publicly renewed its ~$2.6M Habitat partnership in
      June 2025. The reportable nuance is that company-wide corporate philanthropy is disclosed on a
      federal lobbying report "in honor of" a specific sitting House member.
    workflow_step: "records.py he max-item; web verification vs habitat.org newsroom"
    source_records:
      - "data/senate/2025/contributions/contributions_2025.json#91514e3d-2443-4e6e-943c-0b9bd47e4de0"
      - "https://www.habitat.org/newsroom/2025/state-farm-celebrates-more-30-years-partnership-habitat-humanity-international"
    caveats: >
      Real gift, not a fabrication. Legal and uncapped. Seek comment from State Farm and Foxx on the
      honoree attribution before publication.

  # --- Added S3 (2026-07-15): building-fund outside-vs-federal reconciliation ---
  - id: F-008
    thread: T-0007
    status: confirmed
    claim: >
      FULL PERIOD (2022-2025). The complete outside record of the "Mitch McConnell Building" fund (Republican
      Party of Kentucky Building Fund) diverges sharply from the federal lobbying-disclosure record. Per the
      fund's cumulative KREF filings (reported by the Kentucky Lantern, final accounting 2026-01-07), ~22
      named donors + 16 small gifts gave ~$4,426,645 for the completed $4.4M HQ expansion. Reconciled against
      federal LD-203 honorary ('he') building items across all years: only 4 donors DISCLOSED it — Pfizer $1M,
      AT&T $300k, Microsoft $125k, Delta $50k = $1,475,000. THIRTEEN other donors that are themselves active
      federal LDA registrants did NOT disclose a building gift (~$2,122,500): Altria $300k, MetLife $300k,
      Verizon $300k, Brown-Forman $300k, Boeing(PAC) $250k, Beam Suntory $200k, Sazerac $150k, Comcast $100k,
      Churchill Downs $100k, Airbnb $50k, National Thoroughbred Racing Assn $50k, Rescare/BrightSpring $12.5k,
      Toyota $10k. Several of the 13 DID disclose OTHER McConnell honoraria (Toyota $100k JFK Center; Airbnb
      $1,500 AEI; Boeing Hudson gala) but left the larger building gift off. A further ~$829k came from donors
      with no federal lobbying footprint (no federal duty), incl. the #2 donor overall, NWO Resources ($500k),
      plus Jockey Club, Keeneland, a trust, an individual, and 16 small gifts.
    workflow_step: "fullrecon.py + build_full_table.py over all contributions_*.json vs Ky Lantern 2026-01-07 cumulative list"
    source_records:
      - "https://kentuckylantern.com/2026/01/07/ky-republican-hq-upgrade-tops-4-4m-as-special-interest-money-keeps-coming-in/"
      - "https://kentuckylantern.com/2023/01/09/pfizer-gives-1-million-to-republican-party-of-kentucky-to-expand-its-headquarters/"
      - "data/senate/2022/contributions/contributions_2022.json#7fcdd899-5c8c-46cd-94c3-9fa9eb8993b5 (Pfizer, disclosed)"
      - "data/senate/2022/contributions/contributions_2022.json#19b89a8f-3cf2-4d2b-9d8b-5cff6e59163d (AT&T, disclosed)"
    caveats: >
      Supersedes the earlier Q4-2022-only view (was 3 non-disclosers/$500k; full period is 13 registrants/
      ~$2.12M). State amounts are cumulative 3-yr totals; disclosed donors cross-validate well (AT&T $300k
      state = $300k fed; MS $125k=$125k; Pfizer $1M=$1M; Delta $50k state vs $100k fed = likely dup).
      Entity-identity nuances: MetLife (Metropolitan Life Insurance Co. vs MetLife Group, Inc.), Boeing (PAC
      vs Boeing Company), Rescare (now BrightSpring). "Absent from the federal honorary record" is NOT proof
      of a violation — see legal_flags.
    legal_flags:
      - status: to_verify
        note: >
          2 U.S.C. 1604(d)(1)(E)(ii): were the 13 registrants required to disclose the building-fund gift
          federally? All are covered registrants (element 1), funds moved (2), McConnell is a covered official
          (3, per 1602(4)(A)/(12)), FEC carve-out does not apply (4 - fund reports to KY Registry, not FEC).
          Crux: does "named for / in recognition of" reach a gift to a fund for a building named for a senator?
          4 peers (Pfizer/AT&T/Microsoft/Delta) filed the identical gift, cutting toward "covered"; the 4-vs-13
          split is itself why it's a live legal question. Verdict: genuinely-unclear, leans "was required."
          Assert only "possible / for a lawyer." Would flip on: entity-identity mismatches (MetLife, Boeing PAC,
          Rescare/BrightSpring), official LDA guidance on (E), or a filing outside this dataset.
